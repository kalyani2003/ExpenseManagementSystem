version: '3.8'

services:

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_DATABASE: expenses

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"

  springboot-app:
    build: .
    container_name: expense-app

    ports:
      - "8081:8081"

    depends_on:
      - mongodb
      - redis

    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/expenses
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

volumes:
  mongo_data: